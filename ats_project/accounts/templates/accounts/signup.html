{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}" />
  </head>
  <body>
    <div id="screen-signup" class="screen active">
      <div class="auth-wrap">
        <div class="auth-card">
          
          <div class="auth-logo">
            <div class="auth-logo-icon">A</div>
            <div>
              <div class="auth-logo-text">Resume ATS</div>
              <div class="auth-logo-sub">AI-Powered ATS Platform</div>
            </div>
          </div>

          <h2 class="auth-title">Create your account</h2>
          <p class="auth-sub">
            Join us to get started with your ATS journey.
          </p>

          <!-- ✅ FORM START -->
          <form method="POST" action="{% url 'signup_view' %}">
            {% csrf_token %}

            {% if error %}
              <div class="alert alert-error" style="margin-bottom: 20px;">
                {{ error }}
              </div>
            {% endif %}

            {% if success %}
              <div class="alert alert-success" style="margin-bottom: 20px;">
                {{ success }}
              </div>
            {% endif %}

            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                name="full_name"
                placeholder="Your full name"
                required
              />
            </div>

            <div class="form-group">
              <label>Email Address</label>
              <input
                type="email"
                name="email_address"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label>Gender</label>
              <select name="gender" required>
                <option value="">-- Select Gender --</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="prefer-not-to-say">Prefer not to say</option>
              </select>
            </div>

            <div class="form-group" style="display: flex; align-items: flex-start; gap: 8px; margin-bottom: 24px;">
              <input
                type="checkbox"
                name="checkbox"
                style="margin-top: 2px; cursor: pointer;"
                required
              />
              <label style="margin-bottom: 0; font-size: 12px; line-height: 1.5;">
                I agree to the <a href="#" style="color: var(--accent); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--accent); text-decoration: none;">Privacy Policy</a>.
              </label>
            </div>

            <!-- ❌ removed onclick -->
            <button
              type="submit"
              class="btn btn-primary btn-full btn-lg"
            >
              Create Account →
            </button>

          </form>
          <!-- ✅ FORM END -->

          <p class="text-muted text-sm mt-8" style="text-align: center">
            Already have an account?
            <a href="{% url 'login_view' %}" style="color: var(--accent); text-decoration: none; font-weight: 600;">
              Sign In
            </a>
          </p>

        </div>
      </div>
    </div>

    <script src="{% static 'accounts/js/script.js' %}"></script>
  </body>
</html>
