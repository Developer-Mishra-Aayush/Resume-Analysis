{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}" />
  </head>
  <body>

    <div id="screen-login" class="screen active">
      <div class="auth-wrap">
        <div class="auth-card">

          <div class="auth-logo">
            <div class="auth-logo-icon">A</div>
            <div>
              <div class="auth-logo-text">Resume ATS</div>
              <div class="auth-logo-sub">AI-Powered ATS Platform</div>
            </div>
          </div>

          <h2 class="auth-title">Welcome back</h2>
          <p class="auth-sub">
            Enter your email — we'll send you a one-time code.
          </p>

          <!-- ✅ FORM START -->
          <form method="POST" action="{% url 'accounts:login_view' %}">
            {% csrf_token %}

            {% if error %}
              <div class="alert alert-error" style="margin-bottom: 20px;">
                {{ error }}
              </div>
            {% endif %}

            {% if success %}
              <div class="alert alert-success" style="margin-bottom: 20px;">
                {{ success }}
              </div>
            {% endif %}

            <div class="form-group">
              <label>Email Address</label>
              <input
                type="email"
                name="email_address"
                placeholder="you@example.com"
                required
              />
            </div>

            <!-- ❌ removed onclick -->
            <button
              type="submit"
              class="btn btn-primary btn-full btn-lg"
            >
              Send OTP →
            </button>

          </form>
          <!-- ✅ FORM END -->

          <p class="text-muted text-sm mt-8" style="text-align: center">
            New here? Account is created automatically.
          </p>

        </div>
      </div>
    </div>

    <script src="{% static 'accounts/js/script.js' %}"></script>
  </body>
</html>
